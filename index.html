<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Alignment</title>
    <style>
        .container {
            width: 500px;
            height: 250px;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .box {
            border: 1px solid black;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
    </div>
</body>
</html>
